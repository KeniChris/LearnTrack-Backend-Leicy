databases:
  - name: learntrack-db
    databaseName: learntrack_db
    user: learntrack_db_user
    plan: free

services:
  - type: web
    name: learntrack-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /v3/api-docs

    envVars:
      - key: DB_HOST
        fromDatabase:
          name: learntrack-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: learntrack-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: learntrack-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: learntrack-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: learntrack-db
          property: password

      # JWT
      - key: JWT_SECRET
        generateValue: true

      # CORS - URL del frontend en Netlify
      - key: CORS_ALLOWED_ORIGINS
        value: "https://jocular-zuccutto-17b498.netlify.app"
        sync: false

      # Configuración de Spring JPA
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

      # Mail (misma configuración)
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        value: copitocorp.soporte@gmail.com
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
        value: "true"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
        value: "true"

      # Groq (IA)
      - key: GROQ_API_KEY
        sync: false
      - key: SPRING_AI_OPENAI_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL
        value: "llama-3.3-70b-versatile"